name: Oracle A1 VM Auto Retry
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  create-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=/home/runner/.oci/key.pem" >> ~/.oci/config
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem ~/.oci/config

      - name: Try Create VM
        run: |
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N "" -q
          for AD in 1 2 3; do
            echo "=== Trying AD-$AD ==="
            RESULT=$(oci compute instance launch \
              --compartment-id ${{ secrets.TENANCY_OCID }} \
              --availability-domain "hWQW:US-ASHBURN-AD-$AD" \
              --display-name "Roofing-Machine" \
              --image-id ocid1.image.oc1.iad.aaaaaaaahk7zm5s5gv4imyzgui5c77uzfpn72blj3od2icmohxzv3zpuiikq \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --subnet-id ocid1.subnet.oc1.iad.aaaaaaaaiobhami2yqammfaswb7r3biry6wjst7kvfilimz53qmxopsr6o4q \
              --assign-public-ip true \
              --ssh-authorized-keys-file ~/.ssh/id_rsa.pub 2>&1 || true)
            echo "$RESULT"
            if echo "$RESULT" | grep -q "lifecycle-state"; then
              echo "SUCCESS on AD-$AD!"
              exit 0
            fi
            echo "AD-$AD failed"
          done
          echo "All failed - retry in 15 min"
